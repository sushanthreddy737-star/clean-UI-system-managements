<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot / Reset Password</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-body">
  <div class="auth-box">
    <h2>Reset Password</h2>
    <input type="email" id="resetEmail" placeholder="Email" required>
    <div class="password-box">
      <input type="password" id="resetPassword" placeholder="New Password" required>
      <span class="toggle-eye" onclick="togglePassword('resetPassword', this)">🙈</span>
    </div>
    <button onclick="resetPassword()">Reset</button>
    <p><a href="index.html">Login</a></p>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
